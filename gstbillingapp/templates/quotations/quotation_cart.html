{% extends "base.html" %}
{% load static %}
{% block title %}Products Dashboard{% endblock %}

{% block includecss %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.header-card {
    background: linear-gradient(135deg, #0d6efd, #6610f2);
    color:white;
    border-radius:15px;
    padding:20px;
}
.product-img { height:180px; object-fit:cover; }
</style>
{% endblock %}

{% block content %}

<div class="container-fluid p-3">

    <div class="header-card mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h3><i class="bi bi-box-seam"></i> Product Dashboard</h3>
        </div>
        <button class="btn btn-warning position-relative" onclick="openCart()">
            <i class="bi bi-cart"></i> Cart
            <span class="badge bg-danger position-absolute top-0 start-100 translate-middle"
                  id="cartCount">0</span>
        </button>
    </div>

    <!-- FILTER -->
    <div class="card mb-3">
        <div class="card-body row g-2">
            <div class="col-md-4">
                <input type="text" id="searchInput" class="form-control"
                       placeholder="Search..." oninput="applyFilters()">
            </div>
            <div class="col-md-4">
                <select id="categoryFilter" class="form-select"
                        onchange="applyFilters()">
                    <option value="">All Categories</option>
                </select>
            </div>
            <div class="col-md-4 text-end">
                <span class="badge bg-primary" id="totalCount">0 Products</span>
            </div>
        </div>
    </div>

    <div id="productContainer" class="row g-3"></div>

</div>

<!-- CART MODAL -->
<div class="modal fade" id="cartModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Cart</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="cartItems"></div>
      <div class="modal-footer">
        <h5 class="me-auto">Total ₹ <span id="cartTotal">0</span></h5>
      </div>
    </div>
  </div>
</div>

<script>
const PRODUCT_API = "{% url 'productsjson' %}";
const CATEGORY_API = "{% url 'categoriesjson' %}";
const CHECKOUT_API = "#";

let allProducts = [];
let allCategories = [];
let categoryMap = {};
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ---------------- LOAD DATA ---------------- */

async function loadData(){
    const [pRes,cRes] = await Promise.all([
        fetch(PRODUCT_API),
        fetch(CATEGORY_API)
    ]);

    allProducts = await pRes.json();
    allCategories = await cRes.json();

    buildCategoryMap();
    buildCategoryDropdown();
    applyFilters();
    updateCartUI();
}

/* ---------------- CATEGORY TREE ---------------- */

function buildCategoryMap(){
    categoryMap = {};
    allCategories.forEach(cat=>{
        categoryMap[cat.id] = cat;
    });
}

function getCategoryFullPath(catId){
    if(!catId) return "Uncategorized";
    let path = [];
    let current = categoryMap[catId];
    while(current){
        path.unshift(current.category_name);
        current = categoryMap[current.parent_category_id];
    }
    return path.join(" > ");
}

function buildCategoryDropdown(){
    const dropdown = document.getElementById("categoryFilter");
    dropdown.innerHTML = `<option value="">All Categories</option>`;
    allCategories.forEach(cat=>{
        dropdown.innerHTML += `
            <option value="${cat.id}">
                ${getCategoryFullPath(cat.id)}
            </option>
        `;
    });
}

/* ---------------- FILTER ---------------- */

function applyFilters(){
    const search = document.getElementById("searchInput").value.toLowerCase();
    const category = document.getElementById("categoryFilter").value;

    let filtered = allProducts.filter(p=>{
        const matchSearch =
            p.product_name.toLowerCase().includes(search) ||
            p.model_no.toLowerCase().includes(search);

        const matchCategory =
            !category || p.product_category_id == category;

        return matchSearch && matchCategory;
    });

    renderProducts(filtered);
}

/* ---------------- RENDER ---------------- */

function renderProducts(products){

    const container = document.getElementById("productContainer");
    container.innerHTML = "";

    if(products.length===0){
        container.innerHTML =
            `<div class="col-12 text-center text-muted">No Products</div>`;
        return;
    }

    const grouped = {};

    /* -------- GROUP BY CATEGORY -------- */

    products.forEach(p=>{

        const categoryName = getCategoryFullPath(p.product_category_id);

        if(!grouped[categoryName]){
            grouped[categoryName] = {
                withImage: [],
                withoutImage: []
            };
        }

        if(p.product_image_url){
            grouped[categoryName].withImage.push(p);
        } else {
            grouped[categoryName].withoutImage.push(p);
        }
    });

    /* -------- SORT CATEGORY NAMES -------- */

    Object.keys(grouped)
        .sort()
        .forEach(category => {

            const withImg = grouped[category].withImage;
            const withoutImg = grouped[category].withoutImage;

            const hasWith = withImg.length > 0;
            const hasWithout = withoutImg.length > 0;

            container.innerHTML += `
                <div class="col-12">
                    <h4 class="mt-4 border-bottom pb-2 text-primary">
                        ${category}
                    </h4>
                </div>
            `;

            /* -------- BOTH TYPES EXIST -------- */

            if(hasWith && hasWithout){

                container.innerHTML += `
                    <div class="col-12 text-success mt-2">
                        <strong>With Image</strong>
                    </div>
                `;

                withImg.forEach(p=>{
                    container.appendChild(createCard(p));
                });

                container.innerHTML += `
                    <div class="col-12 text-secondary mt-3">
                        <strong>Without Image</strong>
                    </div>
                `;

                withoutImg.forEach(p=>{
                    container.appendChild(createCard(p));
                });
            }

            /* -------- ONLY WITH IMAGE -------- */

            else if(hasWith){
                withImg.forEach(p=>{
                    container.appendChild(createCard(p));
                });
            }

            /* -------- ONLY WITHOUT IMAGE -------- */

            else if(hasWithout){
                withoutImg.forEach(p=>{
                    container.appendChild(createCard(p));
                });
            }

        });

    document.getElementById("totalCount").innerText =
        products.length + " Products";
}

/* ---------------- PRODUCT CARD ---------------- */

function createCard(product){
    const col = document.createElement("div");
    col.className="col-md-4 col-lg-3";

    col.innerHTML = `
        <div class="card shadow-sm h-100">
            ${product.product_image_url ?
                `<img src="${product.product_image_url}"
                      class="card-img-top product-img">`
            : ''
            }
            <div class="card-body d-flex flex-column">
                <h6>${product.product_name}</h6>
                <small class="text-muted">Model: ${product.model_no}</small>
                <h6 class="text-success mt-2">
                    ₹ ${product.product_rate_with_gst}
                </h6>

                <button class="btn btn-primary btn-sm mt-auto"
                        onclick="addToCart(${product.id})">
                    Add To Cart
                </button>
            </div>
        </div>
    `;
    return col;
}

/* ---------------- CART CORE ---------------- */

function addToCart(id){
    const product = allProducts.find(p=>p.id===id);
    const existing = cart.find(p=>p.id===id);

    if(existing){
        existing.qty++;
    } else {
        cart.push({
            ...product,
            qty:1,
            discount: product.product_discount || 0
        });
    }

    saveCart();
}

function saveCart(){
    localStorage.setItem("cart",JSON.stringify(cart));
    updateCartUI();
}

function updateCartUI(){
    document.getElementById("cartCount").innerText =
        cart.reduce((a,b)=>a+b.qty,0);
}

/* ---------------- CART CALCULATIONS ---------------- */

function calculateTotals(){

    let subtotal=0;
    let totalDiscount=0;
    let totalGST=0;

    cart.forEach(item=>{

        const price = item.product_rate_with_gst;
        const discountAmount = (price * item.discount)/100;
        const priceAfterDiscount = price - discountAmount;

        const gstPercent = item.product_gst_percentage;
        const gstAmount = (priceAfterDiscount * gstPercent)/100;

        subtotal += priceAfterDiscount * item.qty;
        totalDiscount += discountAmount * item.qty;
        totalGST += gstAmount * item.qty;
    });

    return {
        subtotal,
        totalDiscount,
        totalGST,
        cgst: totalGST/2,
        sgst: totalGST/2,
        grandTotal: subtotal + totalGST
    };
}

/* ---------------- UPDATE QTY / DISCOUNT ---------------- */

function updateQty(id,value){
    const item = cart.find(p=>p.id===id);
    if(!item) return;

    if(value <= 0){
        cart = cart.filter(p=>p.id!==id);
    } else {
        item.qty = parseFloat(value);
    }

    saveCart();
    openCart();
}

function updateDiscount(id,value){
    const item = cart.find(p=>p.id===id);
    if(!item) return;

    item.discount = parseFloat(value) || 0;
    saveCart();
    openCart();
}

/* ---------------- CLEAR CART ---------------- */

function clearCart(){
    if(!confirm("Clear entire cart?")) return;
    cart=[];
    saveCart();
    openCart();
}

/* ---------------- OPEN CART ---------------- */

function openCart(){

    const container = document.getElementById("cartItems");
    container.innerHTML="";

    if(cart.length===0){
        container.innerHTML="<div class='text-muted text-center'>Cart Empty</div>";
    }

    cart.forEach(item=>{

        const price = item.product_rate_with_gst;
        const discountAmount = (price * item.discount)/100;
        const priceAfterDiscount = price - discountAmount;
        const gstAmount = (priceAfterDiscount * item.product_gst_percentage)/100;
        const total = (priceAfterDiscount + gstAmount) * item.qty;

        container.innerHTML += `
        <div class="border-bottom py-3">

            <div class="d-flex justify-content-between">
                <strong>${item.product_name}</strong>
                <button class="btn btn-sm btn-danger"
                        onclick="updateQty(${item.id},0)">×</button>
            </div>

            <div class="row mt-2">
                <div class="col-md-3">
                    <label>Qty</label>
                    <input type="number" min="1"
                        value="${item.qty}"
                        class="form-control"
                        onchange="updateQty(${item.id}, this.value)">
                </div>

                <div class="col-md-3">
                    <label>Discount %</label>
                    <input type="number"
                        value="${item.discount}"
                        class="form-control"
                        onchange="updateDiscount(${item.id}, this.value)">
                </div>

                <div class="col-md-3">
                    <label>GST %</label>
                    <input type="text"
                        value="${item.product_gst_percentage}%"
                        class="form-control"
                        disabled>
                </div>

                <div class="col-md-3">
                    <label>Total</label>
                    <input type="text"
                        value="₹ ${total.toFixed(2)}"
                        class="form-control"
                        disabled>
                </div>
            </div>

        </div>
        `;
    });

    const totals = calculateTotals();

    container.innerHTML += `
        <div class="mt-4">

            <div class="d-flex justify-content-between">
                <span>Subtotal</span>
                <span>₹ ${totals.subtotal.toFixed(2)}</span>
            </div>

            <div class="d-flex justify-content-between">
                <span>Total Discount</span>
                <span>₹ ${totals.totalDiscount.toFixed(2)}</span>
            </div>

            <div class="d-flex justify-content-between">
                <span>CGST</span>
                <span>₹ ${totals.cgst.toFixed(2)}</span>
            </div>

            <div class="d-flex justify-content-between">
                <span>SGST</span>
                <span>₹ ${totals.sgst.toFixed(2)}</span>
            </div>

            <hr>

            <div class="d-flex justify-content-between fw-bold">
                <span>Grand Total</span>
                <span>₹ ${totals.grandTotal.toFixed(2)}</span>
            </div>

            <div class="d-flex justify-content-between mt-3">
                <button class="btn btn-outline-danger"
                        onclick="clearCart()">Clear Cart</button>

                <button class="btn btn-success"
                        onclick="checkout()">Checkout</button>
            </div>

        </div>
    `;

    new bootstrap.Modal(document.getElementById("cartModal")).show();
}

/* ---------------- CHECKOUT ---------------- */

async function checkout(){

    if(cart.length===0){
        alert("Cart is empty");
        return;
    }

    if(!confirm("Confirm Checkout?")) return;

    const payload = {
        items: cart,
        totals: calculateTotals()
    };

    const response = await fetch(CHECKOUT_API,{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify(payload)
    });

    if(response.ok){
        alert("Order placed successfully!");
        cart=[];
        saveCart();
        location.reload();
    } else {
        alert("Checkout failed");
    }
}

/* ---------------- CSRF ---------------- */

function getCSRFToken(){
    return document.querySelector('[name=csrfmiddlewaretoken]')?.value;
}

document.addEventListener("DOMContentLoaded",loadData);
</script>
{% endblock %}
